name: Verify Native Build Caching Extension

on:
  schedule:
    # Every Sunday at 9.00am - scheduled to test against latest Quarkus version
    - cron: "0 9 * * 0"
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verification:
    name: Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
      - name: Build with Maven
        run: |
          ./mvnw --batch-mode clean package integration-test
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}
      - name: Upload integration tests reports (on failure only)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: Integration tests logs
          path: |
            target/it/**/*.log
